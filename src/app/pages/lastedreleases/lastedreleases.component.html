<section class="container curated-page">
  <header class="page-header">
    <div>
      <span class="section-label">LATEST CURATIONS</span>
      <h1>Hot Picks</h1>
    </div>

    <p class="total-movies">{{ total }} titles</p>
  </header>

  <div class="grid fullpage">
    <app-card
      *ngFor="let movie of latestReleases"
      [movieTitle]="movie?.Title">
    </app-card>
  </div>
</section>
